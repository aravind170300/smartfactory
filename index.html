<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Floor Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        select { width: 100%; padding: 15px; margin-bottom: 20px; font-size: 16px; }
        #reader { width: 100%; margin-bottom: 20px; }
        #status { padding: 15px; text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .success { background-color: #d4edda; color: #155724; }
        .scanning { background-color: #e2e3e5; color: #383d41; }
        
        /* New Button Styles */
        #submitBtn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #submitBtn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h2>Workstation Scanner</h2>
    
    <label for="workstation">Select Workstation:</label>
    <select id="workstation">
        <option value="WS-01">Workstation 01</option>
        <option value="WS-02">Workstation 02</option>
        <option value="WS-03">Workstation 03</option>
    </select>

    <div id="reader"></div>
    <div id="status" class="scanning">Waiting for scan...</div>
    
    <button id="submitBtn" disabled>Submit Scan</button>

    <script>
        // --- PASTE YOUR GOOGLE APPS SCRIPT URL HERE ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOIEguJofXijvc5a7yRIFRnI0B66Y8Lbcmsu51KJf69IhaS-rfjmzNJuUtzZIXIx5t/exec";

        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        
        let currentScannedItem = null; // Stores the item waiting to be submitted

        // 1. Camera reads the code and queues it
        function onScanSuccess(decodedText, decodedResult) {
            currentScannedItem = decodedText;
            statusDiv.textContent = "Ready to submit: " + decodedText;
            statusDiv.className = "success";
            
            // Enable the submit button now that we have a code
            submitBtn.disabled = false; 
            submitBtn.textContent = "Submit: " + decodedText;
        }

        // 2. User clicks the button to send the data
        submitBtn.addEventListener('click', function() {
            if (!currentScannedItem) return; // Do nothing if nothing is scanned

            const workstationId = document.getElementById('workstation').value;
            
            // Update UI to show it is loading
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending to Sheet...";

            // Send data to Google Sheets
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    workstationId: workstationId,
                    productId: currentScannedItem
                })
            }).then(() => {
                // Success message
                statusDiv.textContent = "Saved: " + currentScannedItem;
                statusDiv.className = "success";
                
                // Reset everything for the next scan after 2 seconds
                setTimeout(() => {
                    statusDiv.textContent = "Waiting for next scan...";
                    statusDiv.className = "scanning";
                    submitBtn.textContent = "Submit Scan";
                    currentScannedItem = null; // Clear the queue
                }, 2000);
                
            }).catch(error => {
                statusDiv.textContent = "Error saving scan!";
                submitBtn.textContent = "Try Again";
                submitBtn.disabled = false;
                console.error("Error:", error);
            });
        });

        // Initialize the scanner
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, /* verbose= */ false);
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
